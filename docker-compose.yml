version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mental-health-backend
    ports:
      - "9000:8000"
    volumes:
      - ./backend/models:/app/models
    environment:
      - PYTHONPATH=/app
    networks:
      - mental-health-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./aurasense-ai
      dockerfile: Dockerfile
    container_name: mental-health-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - mental-health-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mental-health-network:
    driver: bridge

volumes:
  models:
    driver: local
