name: DeepSense CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose

    - name: Build Docker Containers
      run: |
        echo "Building the Backend FastAPI and React Frontend containers..."
        docker-compose build

    - name: Verify Containers Start Successfully
      run: |
        echo "Spinning up the containers in detached mode..."
        docker-compose up -d
        
        echo "Checking running containers:"
        docker ps -a
        
        echo "Waiting for Backend to load ML Models (up to 60s)..."
        for i in {1..12}; do
          if curl -s -f http://127.0.0.1:8000/; then
            echo -e "\nBackend is successfully running!"
            break
          fi
          echo -n "."
          sleep 5
        done
        
        echo "Final API Health Check..."
        curl -f http://127.0.0.1:8000/ || (echo "API FAILED! Printing backend logs:" && docker logs mental-health-backend && exit 1)
        
        echo "Testing Frontend UI Health..."
        curl -f http://127.0.0.1:5173/ || (echo "UI FAILED! Printing frontend logs:" && docker logs mental-health-frontend && exit 1)
        
    - name: Shut Down and Clean Up
      if: always()
      run: |
        docker-compose down -v
