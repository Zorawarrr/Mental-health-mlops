services:
  # ─── Backend Service ──────────────────────────────────────────────────────────
  - type: web
    name: mental-health-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: starter # Starter plan allows for larger build contexts and memory
    region: oregon # Choose proximity to your users
    healthCheckPath: /
    numInstances: 1
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: PORT
        value: 8000
    disk:
      name: model-storage
      mountPath: /app/models
      sizeGB: 1 # Enough for the 425MB model + overhead

  # ─── Frontend Service ──────────────────────────────────────────────────────────
  - type: web
    name: mental-health-frontend
    env: docker
    dockerContext: ./aurasense-ai
    dockerfilePath: Dockerfile
    plan: static # Static sites are free on Render, but we use Docker for consistency
    region: oregon
    healthCheckPath: /
    numInstances: 1
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mental-health-backend
          type: web
          property: host
